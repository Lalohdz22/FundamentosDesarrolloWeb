<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Eduardo Alejandro Hernández López</h2>
    <div class="contenedor">
        <h2>Buscador </h2>

        <input type="text" placeholder="Buscar..." class="buscador">

        <div class="grid">
            <div class="card">JavaScript</div>
            <div class="card">CSS</div>
            <div class="card">HTML</div>
            <div class="card">React</div>
            <div class="card">Angular</div>
            <div class="card">Node</div>
            <div class="card">Java</div>
            <div class="card">SQL</div>
            <div class="card">Python</div>
        </div>
    </div>

    <script>
    const buscador = document.querySelector(".buscador");
    const tarjetas = document.querySelectorAll(".card");

    buscador.addEventListener("input", function() {
        const texto = buscador.value.toLowerCase();

        tarjetas.forEach(card => {
            const contenido = card.textContent.toLowerCase();

            if (contenido.includes(texto)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    });
</script>

</body>
</html>
