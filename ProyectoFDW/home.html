<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Repostería Dulce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
    <div class="logo">🍰 Dulce</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Productos</a>
        <a href="#">Nosotros</a>
        <a href="#">Carrito</a>
    </nav>
</header>

<!-- BANNER -->
<section class="banner">
    <h1>Los mejores postres artesanales</h1>
    <button>Ver Productos</button>
</section>

<!-- CATEGORÍAS -->
<section class="categorias">
    <h2>Categorías</h2>
    <div class="grid">
        <div>Pasteles</div>
        <div>Cupcakes</div>
        <div>Galletas</div>
        <div>Pays</div>
    </div>
</section>

<!-- PRODUCTOS -->
<section class="productos">
    <h2>Productos Destacados</h2>
    <div class="grid">
        <div class="card">
            <div class="img"></div>
            <h3>Pastel Chocolate</h3>
            <p>$350</p>
            <button>Agregar</button>
        </div>

        <div class="card">
            <div class="img"></div>
            <h3>Cupcake Vainilla</h3>
            <p>$45</p>
            <button>Agregar</button>
        </div>

        <div class="card">
            <div class="img"></div>
            <h3>Pay Limón</h3>
            <p>$280</p>
            <button>Agregar</button>
        </div>
    </div>
</section>

<footer>
    <p>Contacto | Redes Sociales | Ubicación</p>
</footer>

</body>
</html>
