<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Carrito - Dulce</title>
    <link rel="stylesheet" href="carrito.css">
</head>
<body>

<header>
    <div class="logo">🍰 Dulce</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Productos</a>
        <a href="#">Carrito</a>
    </nav>
</header>

<main class="carrito-container">
    <h2>Tu Carrito</h2>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio</th>
                <th>Eliminar</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Pastel Chocolate</td>
                <td>1</td>
                <td>$350</td>
                <td><button>❌</button></td>
            </tr>

            <tr>
                <td>Cupcake Vainilla</td>
                <td>6</td>
                <td>$270</td>
                <td><button>❌</button></td>
            </tr>
        </tbody>
    </table>

    <div class="resumen">
        <p>Subtotal: $620</p>
        <p>Envío: $80</p>
        <h3>Total: $700</h3>

        <button class="pagar">Proceder al Pago</button>
    </div>
</main>

</body>
</html>
